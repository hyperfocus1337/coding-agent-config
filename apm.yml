name: coding-agent-config
version: 0.1.0
description: Cross-agent dependency manifest (MCP servers + third-party skills)
author: hyperfocus1337
# Which agent platforms to deploy to. Only Claude today; add cursor, codex,
# gemini, etc. here (or via --target) to fan these deps out to more agents.
# Resolution order: --target flag > this field > auto-detect from filesystem.
targets:
- claude
dependencies:
  # Portable skills. mattpocock/skills is a bundle; only the named skills are
  # deployed (basenames resolve across the repo's category subdirs). No lockfile:
  # install re-resolves to latest upstream every run (--update in install.sh).
  # Per-skill reference URLs: docs/agents/skills.md.
  apm:
  - git: mattpocock/skills
    skills:
    - grilling
    - grill-me
    - grill-with-docs
    - codebase-design
    - domain-modeling
    - wayfinder
    - handoff
    - improve-codebase-architecture
    - setup-matt-pocock-skills
    - tdd
    - triage
    - to-tickets
    - to-spec
    - implement
    - code-review
    - research
    - prototype
    - ask-matt
    - diagnosing-bugs
    - resolving-merge-conflicts
    - teach
    - writing-great-skills
  # terraform-skill, moved off the `claude plugin` CLI. Which other plugins
  # were considered and why they stayed: docs/apm/plugin-migration.md.
  - git: antonbabenko/terraform-skill
  # User-scoped MCP servers. Secrets come from the environment at install time
  # (${VAR}) so this manifest stays committable.
  mcp:
  - name: context7
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@upstash/context7-mcp'
    env:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
  # tessl, jcodemunch, jdocmunch, claude-design and orbit are project-scoped
  # opt-in templates now, not user-scoped installs: see templates/mcp/<server>/.
  # LSP servers. Binary must be on $PATH at install time.
  lsp:
  - name: pyright
    command: pyright-langserver
    args:
    - --stdio
    transport: stdio
    extensionToLanguage:
      .py: python
      .pyi: python
includes: auto
scripts: {}
